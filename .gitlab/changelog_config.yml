# GitLab automated changelog configuration.
#
# Consumed by `POST /projects/:id/repository/changelog` (called from the
# CI release job). The API walks the commits in the new tag's range,
# groups them by the `Changelog:` trailer, and prepends a new section to
# `CHANGELOG.md` on the default branch.
#
# To populate a section, add a trailer to your commit message:
#
#     fix: handle parity_count growth on retransmit
#
#     Changelog: fixed
#
# Recognised trailer values are listed under `categories` below.
# Commits without a `Changelog:` trailer are skipped — keep the file
# focused on user-visible changes.
#
# Conventional Commit `type:` prefixes still drive the semver bump
# (computed elsewhere in the release job); GitLab's changelog generator
# itself looks only at the trailer.
#
# Docs: https://docs.gitlab.com/ee/user/project/changelogs.html

date_format: "%Y-%m-%d"

# Header inserted above the first generated section the first time the
# API writes the file. Subsequent runs prepend new sections below it.
header: |
  # Changelog

  All notable changes to this project are documented in this file.

  This file is generated by GitLab from the `Changelog:` trailer on
  each commit, via `.gitlab/changelog_config.yml`. See
  https://docs.gitlab.com/ee/user/project/changelogs.html for details.

  Releases follow [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
  The CI release job computes the bump from Conventional Commit prefixes
  since the last `vX.Y.Z` tag: `BREAKING CHANGE` / `!:` → major,
  `feat:` → minor, anything else → patch.

# Per-tag section template. `%{version}` and `%{date}` come from the
# generator; `%{categories}` expands to one subsection per category
# (in the order listed below) populated with the matching commits.
template: |
  ## [%{version}] - %{date}

  %{categories}

# Subsection template. Each `entry` is one commit.
#   - %{title}    : commit subject line
#   - %{commit}   : SHA (linked to the commit by GitLab)
#   - %{merge_request}: !NNN reference if the commit was merged via MR
#   - %{author}   : @handle (suppressed below for org-only contributors)
category_template: |
  ### %{title}

  %{entries}

entry_template: "- %{title} (%{commit}%{merge_request})"

# Trailer-value -> section-title mapping. Order here is the order
# sections appear in the rendered file.
categories:
  added: Added
  changed: Changed
  deprecated: Deprecated
  removed: Removed
  fixed: Fixed
  security: Security
  performance: Performance
  other: Other
