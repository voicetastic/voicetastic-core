stages:
  - check
  - release

variables:
  GIT_SUBMODULE_STRATEGY: recursive

default:
  tags:
    - rust
  before_script:
    - apt-get update -qq && apt-get install -y -qq libdbus-1-dev libasound2-dev libopus-dev libopencore-amrnb-dev pkg-config protobuf-compiler

build:
  stage: check
  script:
    - cargo build --workspace
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test:
  stage: check
  script:
    - cargo test --workspace
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

clippy:
  stage: check
  script:
    - cargo clippy --workspace --all-targets -- -D warnings
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

fmt:
  stage: check
  script:
    - cargo fmt --all -- --check
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Auto-bump semver on every push to main.
#
# Bump rules (Conventional Commits over the range since last tag):
#   - any commit message containing "BREAKING CHANGE" or a "!:" marker -> major
#   - any "feat:" / "feat(scope):" commit                              -> minor
#   - otherwise                                                        -> patch
#
# Pipeline does:
#   1. compute new vX.Y.Z from last tag + commits since
#   2. update workspace.package.version in Cargo.toml + refresh Cargo.lock
#   3. commit chore(release): vX.Y.Z back to main
#   4. push annotated tag vX.Y.Z
#   5. create a GitLab Release with auto-generated notes
#
# Requirements:
#   - CI/CD variable PROJECT_ACCESS_TOKEN (Project Access Token with
#     `api` + `write_repository` scopes, role Maintainer).
#   - Settings -> Repository -> Protected branches: allow Maintainers
#     to push to `main` (or add the token's bot user to allowed
#     pushers / unprotect for the token).
#   - Settings -> Repository -> Protected tags: allow Maintainers to
#     create `v*`.
release:
  stage: release
  before_script:
    - apt-get update -qq && apt-get install -y -qq libdbus-1-dev libasound2-dev libopus-dev libopencore-amrnb-dev pkg-config protobuf-compiler git curl jq
  script:
    - set -euo pipefail
    - git config --global user.email "ci-bot@${CI_SERVER_HOST}"
    - git config --global user.name  "GitLab CI"
    - |
      if [ -z "${PROJECT_ACCESS_TOKEN:-}" ]; then
        echo "PROJECT_ACCESS_TOKEN is not set; cannot push tag/commit." >&2
        exit 1
      fi
    - git remote set-url origin "https://oauth2:${PROJECT_ACCESS_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git fetch --tags origin
    # Detach onto main so we can commit (CI checks out a detached HEAD by default).
    - git checkout -B main "origin/main"
    # Skip if the head commit is itself the release commit (avoid infinite loop).
    - |
      if git log -1 --pretty=%B | grep -Eq '^chore\(release\): v[0-9]+\.[0-9]+\.[0-9]+'; then
        echo "Head commit is a release commit; nothing to do."
        exit 0
      fi
    - LAST_TAG="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)"
    - |
      if [ -z "$LAST_TAG" ]; then
        MAJOR=0; MINOR=0; PATCH=0
        RANGE_FROM=""
      else
        VERSION="${LAST_TAG#v}"
        MAJOR="${VERSION%%.*}"
        REST="${VERSION#*.}"
        MINOR="${REST%%.*}"
        PATCH="${REST#*.}"
        RANGE_FROM="${LAST_TAG}.."
      fi
    - LOG="$(git log --format=%B ${RANGE_FROM}HEAD)"
    - |
      BUMP=patch
      if printf '%s\n' "$LOG" | grep -Eq '^[[:space:]]*BREAKING CHANGE' || \
         printf '%s\n' "$LOG" | grep -Eq '^[a-zA-Z]+(\([^)]+\))?!:'; then
        BUMP=major
      elif printf '%s\n' "$LOG" | grep -Eq '^feat(\([^)]+\))?:'; then
        BUMP=minor
      fi
    - |
      case "$BUMP" in
        major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
        minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
        patch) PATCH=$((PATCH + 1)) ;;
      esac
    - NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
    - NEW_TAG="v${NEW_VERSION}"
    - echo "Previous tag = ${LAST_TAG:-<none>} ; bump = ${BUMP} ; new tag = ${NEW_TAG}"
    - |
      if git rev-parse -q --verify "refs/tags/${NEW_TAG}" >/dev/null; then
        echo "Tag ${NEW_TAG} already exists, skipping."
        exit 0
      fi
    # Patch workspace.package.version in root Cargo.toml.
    - |
      python3 - "$NEW_VERSION" <<'PY'
      import re, sys, pathlib
      new = sys.argv[1]
      p = pathlib.Path("Cargo.toml")
      txt = p.read_text()
      patched = re.sub(
          r'(\[workspace\.package\][^\[]*?\nversion\s*=\s*")[^"]+(")',
          lambda m: m.group(1) + new + m.group(2),
          txt,
          count=1,
          flags=re.DOTALL,
      )
      if patched == txt:
          sys.exit("Failed to patch workspace.package.version in Cargo.toml")
      p.write_text(patched)
      PY
    # Refresh Cargo.lock so workspace crate version entries match.
    - cargo update --workspace --offline || cargo update --workspace
    - git add Cargo.toml Cargo.lock
    - 'git commit -m "chore(release): ${NEW_TAG}" -m "[skip ci]"'
    - git tag -a "${NEW_TAG}" -m "Release ${NEW_TAG}"
    - git push origin "HEAD:main"
    - git push origin "${NEW_TAG}"
    - |
      NOTES="$(git log --pretty=format:'- %s (%h)' ${RANGE_FROM}HEAD^ | head -n 200)"
      JSON="$(jq -n --arg name "${NEW_TAG}" --arg tag "${NEW_TAG}" --arg desc "$NOTES" \
        '{name:$name, tag_name:$tag, description:$desc}')"
      curl -fsS --request POST \
        --header "PRIVATE-TOKEN: ${PROJECT_ACCESS_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "$JSON" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases" || \
        echo "Release API call failed (tag still pushed)."
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_MESSAGE !~ /^chore\(release\): v[0-9]+\.[0-9]+\.[0-9]+/'
