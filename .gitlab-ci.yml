stages:
  - check
  - release

variables:
  GIT_SUBMODULE_STRATEGY: recursive

default:
  tags:
    - rust
  before_script:
    - apt-get update -qq && apt-get install -y -qq libdbus-1-dev libasound2-dev libopus-dev libopencore-amrnb-dev pkg-config protobuf-compiler

# Run the full check matrix on merge requests and on pushes to the
# default branch (main). No release-related work happens here.
.check-rules: &check-rules
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"

build:
  stage: check
  script:
    - cargo build --workspace --locked
  <<: *check-rules

test:
  stage: check
  script:
    - cargo test --workspace --locked
  <<: *check-rules

clippy:
  stage: check
  script:
    - cargo clippy --workspace --all-targets --locked -- -D warnings
  <<: *check-rules

fmt:
  stage: check
  script:
    - cargo fmt --all -- --check
  <<: *check-rules

# Manual release: triggered only by pushing an annotated tag of the
# form vX.Y.Z to the repository. The maintainer is responsible for:
#
#   1. Editing CHANGELOG.md to move "Unreleased" entries under the new
#      version heading.
#   2. Merging that change into main via an MR.
#   3. Tagging the resulting commit:
#        git tag -a vX.Y.Z -m "Release X.Y.Z"
#        git push origin vX.Y.Z
#
# This pipeline never rewrites Cargo.toml. The binary version shown by
# `--version` is derived at build time from the `vX.Y.Z` git tag by
# each binary crate's build.rs via the VOICETASTIC_VERSION env var.
#
# Requirements:
#   - CI/CD variable PROJECT_ACCESS_TOKEN (Project Access Token with
#     `api` scope) for the Release API call.
#   - Settings -> Repository -> Protected tags: allow Maintainers to
#     create `v*` (tags are pushed manually, not by CI).
release:
  stage: release
  before_script:
    - apt-get update -qq && apt-get install -y -qq libdbus-1-dev libasound2-dev libopus-dev libopencore-amrnb-dev pkg-config protobuf-compiler git curl jq
  script:
    - set -euo pipefail
    - NEW_TAG="${CI_COMMIT_TAG}"
    - NEW_VERSION="${NEW_TAG#v}"
    - echo "Releasing ${NEW_TAG} (version ${NEW_VERSION})"
    - git fetch --tags origin
    - LAST_TAG="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -v "^${NEW_TAG}\$" | head -n1 || true)"
    - cargo build --workspace --locked --release
    # Build the Release description: prefer the matching section of
    # CHANGELOG.md; fall back to the raw git log since the previous tag.
    - |
      if [ -z "${PROJECT_ACCESS_TOKEN:-}" ]; then
        echo "PROJECT_ACCESS_TOKEN not set; skipping GitLab Release API call." >&2
        exit 0
      fi
      NOTES_FILE="$(mktemp)"
      # Extract the CHANGELOG.md section for this version. Matches either
      #   "## X.Y.Z ..." or "## [X.Y.Z] ..." headings; stops at the next "## ".
      CHANGELOG_SECTION=""
      if [ -f CHANGELOG.md ]; then
        CHANGELOG_SECTION="$(awk -v ver="${NEW_VERSION}" '
          /^## / {
            if (in_section) { exit }
            header = $0
            sub(/^## \[?/, "", header)
            sub(/\].*$/, "", header)
            sub(/[[:space:](].*$/, "", header)
            if (header == ver) { in_section = 1; next }
          }
          in_section { print }
        ' CHANGELOG.md)"
      fi
      if [ -n "$CHANGELOG_SECTION" ]; then
        printf '%s\n' "$CHANGELOG_SECTION" > "${NOTES_FILE}"
      else
        echo "No CHANGELOG.md section found for ${NEW_VERSION}; falling back to git log." >&2
        {
          echo "## Changes"
          echo
          git log --pretty=format:'- %s (%h)' "${LAST_TAG:+${LAST_TAG}..}${NEW_TAG}" | head -n 200
        } > "${NOTES_FILE}"
      fi
      NOTES="$(cat "${NOTES_FILE}")"
      JSON="$(jq -n --arg name "${NEW_TAG}" --arg tag "${NEW_TAG}" --arg desc "$NOTES" \
        '{name:$name, tag_name:$tag, description:$desc}')"
      curl -fsS --request POST \
        --header "PRIVATE-TOKEN: ${PROJECT_ACCESS_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "$JSON" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases" || \
        echo "Release API call failed."
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
