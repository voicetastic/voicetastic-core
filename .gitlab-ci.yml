stages:
  - check
  - release

variables:
  GIT_SUBMODULE_STRATEGY: recursive

default:
  tags:
    - rust
  before_script:
    - apt-get update -qq && apt-get install -y -qq libdbus-1-dev libasound2-dev libopus-dev libopencore-amrnb-dev pkg-config protobuf-compiler

build:
  stage: check
  script:
    - cargo build --workspace --locked
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test:
  stage: check
  script:
    - cargo test --workspace --locked
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

clippy:
  stage: check
  script:
    - cargo clippy --workspace --all-targets --locked -- -D warnings
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

fmt:
  stage: check
  script:
    - cargo fmt --all -- --check
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Auto-tag a semver release on every push to main.
#
# The release pipeline never rewrites Cargo.toml. The binary version
# shown by `--version` is derived at build time from the latest
# `vX.Y.Z` git tag by each binary crate's `build.rs`, via the
# `VOICETASTIC_VERSION` env var.
#
# Bump rules (Conventional Commits over the range since last tag):
#   - any commit message containing "BREAKING CHANGE" or a "!:" marker -> major
#   - any "feat:" / "feat(scope):" commit                              -> minor
#   - otherwise                                                        -> patch
#
# Pipeline does:
#   1. compute new vX.Y.Z from last tag + commits since
#   2. push annotated tag vX.Y.Z
#   3. create a GitLab Release whose description is the raw `git log`
#      since the previous tag.
#
# Requirements:
#   - CI/CD variable PROJECT_ACCESS_TOKEN (Project Access Token with
#     `api` + `write_repository` scopes, role Maintainer).
#   - Settings -> Repository -> Protected tags: allow Maintainers to
#     create `v*`.
release:
  stage: release
  before_script:
    - apt-get update -qq && apt-get install -y -qq libdbus-1-dev libasound2-dev libopus-dev libopencore-amrnb-dev pkg-config protobuf-compiler git curl jq
  script:
    - set -euo pipefail
    - git config --global user.email "ci-bot@${CI_SERVER_HOST}"
    - git config --global user.name  "GitLab CI"
    - |
      if [ -z "${PROJECT_ACCESS_TOKEN:-}" ]; then
        echo "PROJECT_ACCESS_TOKEN is not set; cannot push tag." >&2
        exit 1
      fi
    - git remote set-url origin "https://oauth2:${PROJECT_ACCESS_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git fetch --tags origin
    - LAST_TAG="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)"
    - |
      if [ -z "$LAST_TAG" ]; then
        MAJOR=0; MINOR=0; PATCH=0
        RANGE_FROM=""
      else
        VERSION="${LAST_TAG#v}"
        MAJOR="${VERSION%%.*}"
        REST="${VERSION#*.}"
        MINOR="${REST%%.*}"
        PATCH="${REST#*.}"
        RANGE_FROM="${LAST_TAG}.."
      fi
    - LOG="$(git log --format=%B ${RANGE_FROM}HEAD)"
    - |
      BUMP=patch
      if printf '%s\n' "$LOG" | grep -Eq '^[[:space:]]*BREAKING CHANGE' || \
         printf '%s\n' "$LOG" | grep -Eq '^[a-zA-Z]+(\([^)]+\))?!:'; then
        BUMP=major
      elif printf '%s\n' "$LOG" | grep -Eq '^feat(\([^)]+\))?:'; then
        BUMP=minor
      fi
    - |
      case "$BUMP" in
        major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
        minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
        patch) PATCH=$((PATCH + 1)) ;;
      esac
    - NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
    - NEW_TAG="v${NEW_VERSION}"
    - echo "Previous tag = ${LAST_TAG:-<none>} ; bump = ${BUMP} ; new tag = ${NEW_TAG}"
    - |
      if git rev-parse -q --verify "refs/tags/${NEW_TAG}" >/dev/null; then
        echo "Tag ${NEW_TAG} already exists, skipping."
        exit 0
      fi
    - git tag -a "${NEW_TAG}" -m "Release ${NEW_TAG}"
    - git push origin "${NEW_TAG}"
    # Build the Release description from the raw git log since the
    # previous tag.
    - |
      NOTES_FILE="$(mktemp)"
      git log --pretty=format:'- %s (%h)' "${LAST_TAG:+${LAST_TAG}..}HEAD" \
        | head -n 200 > "${NOTES_FILE}"
      NOTES="$(cat "${NOTES_FILE}")"
      JSON="$(jq -n --arg name "${NEW_TAG}" --arg tag "${NEW_TAG}" --arg desc "$NOTES" \
        '{name:$name, tag_name:$tag, description:$desc}')"
      curl -fsS --request POST \
        --header "PRIVATE-TOKEN: ${PROJECT_ACCESS_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "$JSON" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases" || \
        echo "Release API call failed (tag still pushed)."
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"'

