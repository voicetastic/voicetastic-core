[workspace]
resolver = "2"
members = [
    "crates/voicetastic-core",
    "crates/voicetastic-cli",
    "crates/voicetastic-gui",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.80"
license = "MIT"
repository = "https://git.cha-sam.re/acarteron/voicetastic-desktop"

[workspace.dependencies]
voicetastic-core = { path = "crates/voicetastic-core" }

# Async runtime
tokio = { version = "1.40", features = ["macros", "rt-multi-thread", "sync", "time", "io-util", "io-std", "fs", "signal"] }
tokio-stream = "0.1"
futures = "0.3"
async-trait = "0.1"

# Errors / logging
thiserror = "1"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

# Protobuf
prost = "0.13"
prost-build = "0.13"
prost-types = "0.13"

# BLE
btleplug = "0.11"
uuid = { version = "1", features = ["v4"] }

# Serial
tokio-serial = "5.4"

# Serde
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

# Utility
bytes = "1"
hex = "0.4"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
parking_lot = "0.12"

# CLI
clap = { version = "4", features = ["derive", "env"] }
indicatif = "0.17"

# GUI
eframe = { version = "0.29", default-features = false, features = ["default_fonts", "glow", "wayland", "x11"] }
egui = "0.29"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
